# Default values for outbound-processor
replicaCount: 1

image:
  repository: outbound-processor
  tag: latest
  pullPolicy: Never

service:
  port: 8080

# Database configuration
db:
  host: diploma-postgresql
  port: "5432"
  name: diploma
  user: diploma
  password: password

# Kafka configuration
kafka:
  host: diploma-kafka
  brokers: diploma-kafka:9092

# Resource limits and requests
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Probes configuration
readinessProbe:
  path: /q/health/ready
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  path: /q/health/live
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
