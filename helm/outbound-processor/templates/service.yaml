apiVersion: v1
kind: Service
metadata:
  name: {{ include "outbound-processor.name" . }}
  labels:
    {{- include "outbound-processor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    {{- include "outbound-processor.selectorLabels" . | nindent 4 }}
