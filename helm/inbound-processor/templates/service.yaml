apiVersion: v1
kind: Service
metadata:
  name: {{ include "inbound-processor.fullname" . }}
  labels:
    {{- include "inbound-processor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
      protocol: TCP
  selector:
    {{- include "inbound-processor.selectorLabels" . | nindent 4 }}
