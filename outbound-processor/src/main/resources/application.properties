camel.main.name=OutboundProcessor
camel.component.mapstruct.mapper-package-name=com.ivan.outbound.mapper

# Kafka component configuration - using environment variable resolution
camel.component.kafka.brokers={{env:KAFKA_BROKERS:localhost:9092}}
camel.component.kafka.auto-offset-reset=earliest
camel.component.kafka.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

#TODO: use Avro?

# Kafka Configuration
kafka.topic=topic-inbound-processor
kafka.dead-letter-topic=topic-inbound-processor-dlt
kafka.group-id=outbound-processor-group
