camel.main.name=OutboundProcessor
camel.main.main-listener-classes=com.ivan.outbound.listener.DatabaseSeedListener
camel.component.mapstruct.mapper-package-name=com.ivan.outbound.mapper

camel.component.kafka.brokers={{env:KAFKA_BROKERS}}
camel.component.kafka.auto-offset-reset=earliest
camel.component.kafka.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
camel.component.kafka.additional-properties[schema.registry.url]={{env:SCHEMA_REGISTRY_URL}}
camel.component.kafka.additional-properties[specific.avro.reader]=true

# Kafka Configuration
kafka.topic=diploma-orders-topic
kafka.dead-letter-topic=diploma-orders-topic-dlt
kafka.group-id=outbound-processor-group-id

api.currency.base-url=https://api.exchangerate-api.com

# Cache Configuration
cache.currency.ttl-hours=1

# Database Configuration
db.host={{env:DB_HOST}}
db.port={{env:DB_PORT}}
db.name={{env:DB_NAME}}
db.user={{env:DB_USER}}
db.password={{env:DB_PASSWORD}}

