camel.main.name=InboundProcessor
camel.component.mapstruct.mapper-package-name=com.ivan.inbound.mapper

camel.component.kafka.brokers={{env:KAFKA_BROKERS:localhost:9092}}
camel.component.kafka.auto-offset-reset=earliest
camel.component.kafka.value-serializer=org.apache.kafka.common.serialization.StringSerializer
#TODO: use Avro?

# Kafka Configuration
kafka.topic={{env:KAFKA_TOPIC:topic-inbound-processor}}
kafka.dead-letter-topic={{env:KAFKA_DLT_TOPIC:topic-inbound-processor-dlt}}

# Rest Configuration
camel.rest.port=8080
