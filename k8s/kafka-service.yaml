apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: diploma-app
  labels:
    app: kafka
spec:
  ports:
    - name: kafka
      protocol: TCP
      port: 9092
      targetPort: 9092
    - name: controller
      protocol: TCP
      port: 9093
      targetPort: 9093
  selector:
    app: kafka